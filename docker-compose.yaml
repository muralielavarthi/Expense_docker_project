version: "3.8"

services:
  mysql:
    build: ./db
    container_name: mysql
    env_file: .env
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend
    env_file: .env
    depends_on:
      - mysql

  web:
    build: ./web
    container_name: web
    env_file: .env
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      - backend

volumes:
  db_data:
